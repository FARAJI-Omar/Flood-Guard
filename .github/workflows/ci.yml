name: CI Pipeline

on:
  push:
    branches: [ main, dev, auth ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: flood_guard
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d flood_guard"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run tests
      env:
        DB_URL: jdbc:postgresql://localhost:5432/flood_guard
        DB_USERNAME: testuser
        DB_PASSWORD: testpass
        JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LWZvci1jaS1vbmx5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhzMjU2LWFsZ29yaXRobQ==
        JWT_ACCESS_TOKEN_EXPIRATION: 900000
        JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      run: mvn test

    - name: Build Docker image
      run: docker build -t floodguard-backend:${{ github.sha }} .

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag floodguard-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/floodguard-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/floodguard-backend:latest
